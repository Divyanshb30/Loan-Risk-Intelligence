# configs/config.yaml

paths:
  raw_data: "data/raw/P2P_Macro_Data.dta"
  processed_data: "data/processed/features.parquet"
  outputs: "data/outputs/"

target: "badloan"

model:
  test_size: 0.2
  random_state: 42
  cv_folds: 5

xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0

nn:
  batch_size: 4096
  epochs: 50
  learning_rate: 0.0003
  dropout: 0.2
  patience: 12
  weight_decay: 0.0001
  scheduler_patience: 6
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_xgb_feature: true


features:
  drop_leakage:
    - total_pymnt
    - total_pymnt_inv
    - total_rec_prncp
    - total_rec_int
    - total_rec_late_fee
    - recoveries
    - collection_recovery_fee
    - out_prncp
    - out_prncp_inv
    - last_pymnt_amnt
    - last_pymnt_d
    - next_pymnt_d
    - loan_status
    - loan_status_
    - loan_status_5
    - rankloan_status_
  interaction_features:
    - dti_x_unemployment
    - real_interest_rate
    - loan_to_income
    - util_x_delinq
    - fed_x_term
  
